<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpecFlow Reader</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <h1>SpecFlow Reader</h1>
        <p id="project-meta" data-i18n="loading"></p>
      </div>
      <nav class="view-nav" role="tablist" data-i18n-attr="aria-label:viewNavAria">
        <button class="tab active" data-view="status" type="button">
          <strong data-i18n="tabs.status.title"></strong>
          <span data-i18n="tabs.status.subtitle"></span>
        </button>
        <button class="tab" data-view="project" type="button">
          <strong data-i18n="tabs.project.title"></strong>
          <span data-i18n="tabs.project.subtitle"></span>
        </button>
        <button class="tab" data-view="specflow" type="button">
          <strong>SpecFlow</strong>
          <span data-i18n="tabs.specflow.subtitle"></span>
        </button>
      </nav>
      <div class="topbar-actions">
        <label class="language-control" for="language-select">
          <span data-i18n="language.label"></span>
          <select id="language-select">
            <option value="zh-CN" data-i18n="language.zh"></option>
            <option value="en">English</option>
          </select>
        </label>
        <button id="refresh-button" type="button" data-i18n="refresh"></button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section id="nav-panel" class="panel"></section>
      </aside>

      <section class="workspace">
        <section id="view-summary" class="view-summary"></section>
        <div class="graph-shell">
          <div class="graph-legend" data-i18n-attr="aria-label:graphLegendAria">
            <span class="legend-item" tabindex="0" data-i18n-attr="data-tooltip:legend.unit.tooltip">
              <i class="legend-dot legend-unit"></i><span data-i18n="legend.unit.label"></span>
            </span>
            <span class="legend-item" tabindex="0" data-i18n-attr="data-tooltip:legend.scenario.tooltip">
              <i class="legend-dot legend-scenario"></i><span data-i18n="legend.scenario.label"></span>
            </span>
            <span class="legend-item" tabindex="0" data-i18n-attr="data-tooltip:legend.shared.tooltip">
              <i class="legend-dot legend-shared"></i><span data-i18n="legend.shared.label"></span>
            </span>
            <span class="legend-item" tabindex="0" data-i18n-attr="data-tooltip:legend.truth.tooltip">
              <i class="legend-dot legend-truth"></i><span data-i18n="legend.truth.label"></span>
            </span>
            <span class="legend-item" tabindex="0" data-i18n-attr="data-tooltip:legend.path.tooltip">
              <i class="legend-dot legend-path"></i><span data-i18n="legend.path.label"></span>
            </span>
            <span class="legend-item" tabindex="0" data-i18n-attr="data-tooltip:legend.system.tooltip">
              <i class="legend-dot legend-system"></i><span data-i18n="legend.system.label"></span>
            </span>
          </div>
          <div id="graph-view" class="graph-view"></div>
        </div>
      </section>

      <div id="resize-bar" class="resize-bar" role="separator" aria-orientation="vertical" data-i18n-attr="aria-label:resizeAria"></div>

      <aside class="inspector-panel">
        <div class="inspector-tabs" role="tablist" data-i18n-attr="aria-label:inspectorTabsAria">
          <button id="info-tab" class="inspector-tab active" data-inspector-tab="info" type="button" data-i18n="inspector.infoTab"></button>
          <button id="truth-tab" class="inspector-tab" data-inspector-tab="truth" type="button" data-i18n="inspector.truthTab"></button>
        </div>
        <section id="detail-panel" class="detail-panel inspector-content"></section>
        <section id="truth-panel" class="truth-panel inspector-content hidden">
          <div class="truth-header">
            <div>
              <h2 data-i18n="inspector.truthTitle"></h2>
              <span id="source-path"></span>
            </div>
            <div class="doc-mode-switch" data-i18n-attr="aria-label:docModeAria">
              <button class="doc-mode active" data-doc-mode="rendered" type="button" data-i18n="docMode.rendered"></button>
              <button class="doc-mode" data-doc-mode="raw" type="button" data-i18n="docMode.raw"></button>
            </div>
          </div>
          <article id="source-rendered" class="markdown-doc"></article>
          <pre id="source-content" class="hidden"></pre>
        </section>
      </aside>
    </main>

    <script src="/cytoscape.min.js"></script>
    <script src="/mermaid.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
