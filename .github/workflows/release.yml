name: Release

on:
  push:
    tags:
      - "specflow-tooling-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tooling/go.mod

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          repo_root="${RUNNER_TEMP}/specflow-release-root"
          rm -rf "${repo_root}"
          mkdir -p "${repo_root}"
          ln -s "${GITHUB_WORKSPACE}" "${repo_root}/specflow"
          echo "SPECFLOW_RELEASE_REPO_ROOT=${repo_root}" >> "${GITHUB_ENV}"
          cd "${GITHUB_WORKSPACE}/tooling"
          go run ./cmd/specflowctl build-release --repo-root "${repo_root}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/tooling/bin"
          sha256sum specflowctl-* specflow-reader-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          fingerprint="$("${SPECFLOW_RELEASE_REPO_ROOT}/specflow/tooling/scripts/tooling_fingerprint.sh")"
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "SpecFlow tooling release ${GITHUB_REF_NAME}. Tooling fingerprint: ${fingerprint}." \
            tooling/bin/specflowctl-* \
            tooling/bin/specflow-reader-* \
            tooling/bin/SHA256SUMS
